<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Grid and Slideshow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="auth-screen">
  <div class="auth-container">
    <h2>Enter Username and Password</h2>
    <input type="text" id="username" placeholder="Username"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <button onclick="authenticate()">Login</button>
    <p id="error-msg">Incorrect Username or Password</p>
  </div>
</div>

<div id="content">
  <!-- Image Grid -->
  <div class="image-grid">
    <div class="image-block" onclick="openFullscreen(0)">
      <img src="https://us.rule34.xxx/thumbnails/2366/thumbnail_272c0c593582aa9b41ee21645d68f1bf.jpg?10415767" alt="Image 1">
    </div>
    <div class="image-block" onclick="openFullscreen(1)">
      <img src="https://us.rule34.xxx//samples/1806/sample_5a8e0f8fbb26c4ca5f59076f00391d45.jpg?9901801" alt="Image 2">
    </div>
    <div class="image-block" onclick="openFullscreen(2)">
      <img src="https://us.rule34.xxx//samples/2257/sample_90a9dff83c8d06990bcb98cdaa467104.jpg?11132016" alt="Image 3">
    </div>
    <div class="image-block" onclick="openFullscreen(3)">
      <img src="https://us.rule34.xxx//images/5503/6ca0e7a3f02f8c1deaef43c398fc7d9a.jpeg?10788806" alt="Image 4">
    </div>
    <div class="image-block" onclick="openFullscreen(4)">
      <img src="https://us.rule34.xxx//images/2366/ff7e51748c333b1b41ef713ab01d02dd.jpeg?10415710" alt="Image 5">
    </div>
    <div class="image-block" onclick="openFullscreen(5)">
      <img src="https://us.rule34.xxx//images/2075/ce42e8b1158ac05e235abcd2c36da179.png?10104213" alt="Image 6">
    </div>
    <div class="image-block" onclick="openFullscreen(6)">

    </div>
    <div class="image-block" onclick="openFullscreen(7)">
      <img src="https://us.rule34.xxx//images/513/1f9f9c2ca342567ead63304206e51387.jpeg?9364619" alt="Image 8">

      <img src="https://us.rule34.xxx//samples/7414/sample_a908b93195914d913c035bb200a3bcb9.jpg?8459878" alt="Image 9">
    </div>

    <div class="image-block" onclick="openFullscreen(17)">
      <img src="https://rule34xyz.b-cdn.net/posts/3676/3676650/3676650.picsmall.jpg" alt="Image 18">
    </div>
  </div>
  

  <!-- Fullscreen Modal -->
  <div id="fullscreen" class="fullscreen">
    <button class="close-btn" onclick="closeFullscreen()">&times;</button>
    <button class="prev-btn" onclick="changeSlide(-1)">&#10094;</button>
    <img id="fullscreen-img" src="" alt="Fullscreen Image">
    <button class="next-btn" onclick="changeSlide(1)">&#10095;</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
