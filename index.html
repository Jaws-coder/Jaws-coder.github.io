<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Grid</title>
  <style>
    /* Basic grid layout for images */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr); /* 6 images per row */
      gap: 10px;
      padding: 10px;
    }
    .image-block {
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }
    .image-block img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 5px;
    }

    /* Fullscreen overlay style */
    .fullscreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 10000;
      justify-content: center;
      align-items: center;
    }
    .fullscreen img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 30px;
      background-color: transparent;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Fullscreen Modal -->
  <div id="fullscreen" class="fullscreen" onclick="closeFullscreen()">
    <button class="close-btn">&times;</button>
    <img id="fullscreen-img" src="" alt="Fullscreen Image">
  </div>

  <script>
    // Function to open the image in fullscreen
    function openFullscreen(element) {
      var imgSrc = element.querySelector("img").src;
      var fullscreenImg = document.getElementById("fullscreen-img");
      fullscreenImg.src = imgSrc;
      document.getElementById("fullscreen").style.display = "flex";
    }

    // Function to close the fullscreen view
    function closeFullscreen() {
      document.getElementById("fullscreen").style.display = "none";
    }
  </script>
